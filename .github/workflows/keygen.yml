name: Run Search Script

on:
  workflow_dispatch:  # Това позволява ръчно стартиране на GitHub Actions
  schedule:
    - cron: '0 0 * * *'  # Изпълнение всеки ден в 00:00 UTC (по избор)

jobs:
  search-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Можеш да промениш версията на Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run the search script
        run: |
          python passgen.py

      - name: Commit key.txt
        run: |
          git config --global user.name "belchew"
          git config --global user.email "belchew@outlook.com"
          git add key.txt
          git commit -m "Update key.txt with search result"
          git push
