name: Search and Result

on:
  workflow_dispatch:       # 👉 Ръчно стартиране
 # schedule:                # 👉 Автоматично по график
 #   - cron: '0 7 * * *'    # Всеки ден в 07:00 UTC (можеш да промениш)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout репото
      uses: actions/checkout@v3

    - name: Настройка на Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Инсталиране на зависимости
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Изпълнение на скрипта
      run: python passgen.py
