name: KeyGen

on:
  schedule:
    - cron: "0 6 * * *"  # Всеки ден в 06:00 UTC
  workflow_dispatch:  # Позволява ръчно стартиране

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper script
        run: python passgen.py  # Изпълнява скрипта

      - name: Set up Git configuration
        uses: gitconfig/actions/setup-git@v1
        with:
          user-name: "belchew"
          user-email: "belchew@outlook.com"

      - name: Commit and push key.txt to repository
        run: |
          git add key.txt
          git commit -m "Update key.txt with new data"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
