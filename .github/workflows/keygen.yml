name: Run Search Script

on:
  workflow_dispatch:       # 👉 Ръчно стартиране
 # schedule:                # 👉 Автоматично по график
 #   - cron: '0 7 * * *'    # Всеки ден в 07:00 UTC (можеш да промениш)

on:
  push:
    branches:
      - main  # Може да настроиш да работи при определени събития, като push към main
  schedule:
    - cron: '0 0 * * *'  # Изпълнение всеки ден в 00:00 UTC

jobs:
  search-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Можеш да промениш версията на Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run the search script
        run: |
          python passgen.py

      - name: Commit key.txt
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add key.txt
          git commit -m "Update key.txt with search result"
          git push
